# 示例：同一域名下，Nginx 分流 Next（官网）与 Python（AI 助手）
#
# 注意：
# 1) 不要把 location /admin 指到 Python。/admin/* 是 Next 的后台页面，必须在 Node。
# 2) Python 的接口以 /api/... 为主；其中 /api/admin/* 与 Next 的 /api/admin/* 路径并存，
#    下面用「更长的 location」把 Next 独占的路径指到 3000，其余 /api/admin/ 给 Python。
# 3) /api/submissions 在 Next 与 Python 里都有实现；本站后台用的是 Next 版，必须走 3000。
#
# 使用前请替换：域名、证书路径、upstream 端口。
# proxy-headers.conf 与本文件同目录时，可改为绝对路径，例如：
#   include /etc/nginx/snippets/flyingnets-proxy-headers.conf;

upstream next_app {
    server 127.0.0.1:3000;
}

# Uvicorn 实际监听端口以你机器为准（常见 8000 或 8081）
upstream python_ai {
    server 127.0.0.1:8081;
}

server {
    listen 443 ssl http2;
    server_name www.sgflyingnets.com;

    # ssl_certificate /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 50m;

    # ---------- Next 独占的 /api/admin/*（须写在通用 /api/admin/ 之前） ----------
    location ^~ /api/admin/account     { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/password     { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/stats        { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/layout       { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/material-preview  { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/material-download { proxy_pass http://next_app; include proxy-headers.conf; }
    location ^~ /api/admin/smtp-test    { proxy_pass http://next_app; include proxy-headers.conf; }

    # ---------- Python：仅 AI 助手相关 API ----------
    location ^~ /api/chat {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
        proxy_read_timeout 300s;
    }

    location ^~ /api/knowledge/upload {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
        client_max_body_size 50m;
    }

    location ^~ /api/materials/upload {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
        client_max_body_size 50m;
    }

    location ^~ /api/sales-emails {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
    }

    location ^~ /api/token-usage {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
    }

    location ^~ /api/webhook/ {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
    }

    # Python admin_routes：/api/admin/email-config、llm、prompts、material-library 等
    location ^~ /api/admin/ {
        proxy_pass http://python_ai;
        include proxy-headers.conf;
        client_max_body_size 50m;
    }

    # ---------- 默认：整站（含 /admin、/_next、/api/* 其余）走 Next ----------
    location / {
        proxy_pass http://next_app;
        include proxy-headers.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
